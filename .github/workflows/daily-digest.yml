# === Daily Digest: 每日資訊摘要 → 腳本草稿 ===
# 抓取當日科技熱點 → LLM 摘要 → 產生短影音腳本草稿（存成 artifact 供人工挑選/再加工）。
name: Daily Content Digest

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Connect to Tailscale (reach local vLLM; falls back to DeepSeek)
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Fetch & summarize
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/fetch_daily_digest.py --limit 10 > digest.md

      - name: Draft short-video script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/script_from_digest.py --input digest.md --format short_video --output draft_script.txt

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: |
            digest.md
            draft_script.txt

  notify-failure:
    needs: [digest]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
