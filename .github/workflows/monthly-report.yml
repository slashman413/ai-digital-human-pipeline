name: Monthly site report
on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build + post report
        run: python monthly_report.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add views_snapshot.json
          git diff --staged --quiet || git commit -m "chore: monthly views snapshot - author: claude-code"
          git push