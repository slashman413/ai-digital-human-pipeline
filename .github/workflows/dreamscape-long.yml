name: Dreamscape Long (looped hours)

# One-off long-form meditation video: build a short seamless base, stream-loop it
# (video copied, not re-encoded) to N hours, then upload. workflow_dispatch only.
on:
  workflow_dispatch:
    inputs:
      hours:
        description: "final video length in hours"
        default: "2.5"
      base_minutes:
        description: "length of the seamless base that gets looped (minutes)"
        default: "8"
      publish:
        description: "publish to YouTube (false = build only)"
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg + fonts + deps
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install -r requirements.txt google-api-python-client google-auth google-auth-oauthlib

      - name: 1) Daily concept (title + music/image prompts + SEO)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/dreamscape_concept.py --outdir .
          # rewrite the SEO title + description for the long-form duration
          SHORT=$(cat title.txt)
          HRS="${{ inputs.hours }}"
          CAP=$(python -c "import sys;t=sys.argv[1].strip();print(t[:1].upper()+t[1:])" "$SHORT")
          echo "${CAP} 🌅 ${HRS} Hours Relaxing Piano with Water & Birdsong | Sleep & Meditation" > yt_title.txt
          printf "\n\n🎧 %s hours of seamless piano + gentle water & birdsong for deep sleep, study and meditation." "$HRS" >> description.txt
          echo "Title: $(cat title.txt)"
          echo "SEO:   $(cat yt_title.txt)"

      - name: 2) Generate meditation piano music (Replicate MusicGen — short clip)
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          python scripts/generate_music.py --prompt "$(cat music_prompt.txt)" \
            --duration 60 --model-version stereo-large --output-format wav --output output/music.wav

      - name: 3) Build seamless base video (no end fade, so it loops cleanly)
        run: |
          python scripts/make_music_video.py --music output/music.wav \
            --prompts-file prompts.txt --title "$(cat title.txt)" \
            --output output/base.mp4 --workdir build_mv --font "DejaVu Sans" \
            --nature assets/nature.mp3 --seg-seconds 25 --end-fade 0 \
            --loop-to "$(( ${{ inputs.base_minutes }} * 60 ))"

      - name: 3b) Stream-loop the base to full length (video copied; single fade at the very end)
        run: |
          TARGET=$(python -c "print(int(float('${{ inputs.hours }}')*3600))")
          echo "looping output/base.mp4 -> ${TARGET}s"
          ffmpeg -y -stream_loop -1 -i output/base.mp4 \
            -c:v copy -c:a aac -b:a 320k -ar 48000 \
            -af "afade=t=out:st=$((TARGET-6)):d=6" -t "$TARGET" \
            -movflags +faststart output/video.mp4
          echo "final: $(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 output/video.mp4)s"

      - name: 4) Thumbnail (frame with title)
        run: |
          ffmpeg -y -ss 8 -i output/base.mp4 -frames:v 1 -vf scale=1280:720 output/thumbnail.jpg

      - name: 5) Publish to YouTube (public)
        env:
          YOUTUBE_CLIENT_ID: ${{ inputs.publish != 'false' && secrets.YOUTUBE_CLIENT_ID || '' }}
          YOUTUBE_CLIENT_SECRET: ${{ inputs.publish != 'false' && secrets.YOUTUBE_CLIENT_SECRET || '' }}
          YOUTUBE_REFRESH_TOKEN: ${{ inputs.publish != 'false' && secrets.YOUTUBE_REFRESH_TOKEN || '' }}
        run: |
          python scripts/upload_youtube.py --video output/video.mp4 \
            --title "$(cat yt_title.txt)" \
            --description "$(cat description.txt)" --tags "$(cat tags.txt)" \
            --privacy public --thumbnail output/thumbnail.jpg --url-out youtube_url.txt \
            --playlist PLX0z3_uqHkc2NujR-UyNFbbBJXobaz2Bw --channel-id UCvd4nL04uE7lFqkKtzsOwLg \
            --affiliate "🎧 我愛用的降噪耳機 Soundcore Q20i (relax & sleep) → https://www.amazon.com/dp/B0C3HCD34R?tag=ytstories0413-20" --kofi https://ko-fi.com/ytstories0413 || true

      - name: 6) Notify Discord (success)
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            URL=$(cat youtube_url.txt 2>/dev/null || echo "")
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"🎹🌅 ${{ inputs.hours }}h dreamscape：$(cat title.txt 2>/dev/null) $URL\"}" "$WEBHOOK"
          fi

      - name: 6b) Notify Discord on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -s -H "Content-Type: application/json" \
              -d "{\"content\":\"🔴 dreamscape long workflow 失敗！查看 log：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$WEBHOOK"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dreamscape-long
          path: |
            output/base.mp4
            output/thumbnail.jpg
            title.txt
            yt_title.txt
            description.txt
          retention-days: 7
