# === GPU Processing: 觸發本機 GPU 跑 Wav2Lip / SadTalker / MuseTalk ===
# 需先在你的 Windows GPU 機器註冊 self-hosted runner（labels: self-hosted, windows, gpu）。
# 可獨立手動觸發，或由 content-pipeline 的 gpu-processing job 串接。
name: GPU Processing — Trigger Local

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: '來源 workflow run id（用於下載 final-video artifact），留空則用本 repo 最近一次'
        required: false
        type: string

jobs:
  process-gpu:
    runs-on: [self-hosted, windows, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Download final-video artifact
        uses: actions/download-artifact@v4
        with:
          name: final-video
          run-id: ${{ inputs.run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Wav2Lip lip-sync (GPU)
        env:
          WAV2LIP_DIR: ${{ secrets.WAV2LIP_DIR }}
        run: |
          python scripts/wav2lip_process.py --video output/final_video.mp4 --audio audio/voice.mp3 --output output/talking_head.mp4

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: gpu-processed
          path: output/talking_head.mp4
