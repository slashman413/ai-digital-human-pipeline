# === Daily Auto: trend -> video -> auto-post to YouTube + TikTok + Bilibili ===
# 每天自動：抓 Google Trends 熱門主題 → DeepSeek 寫腳本 → 仿真背景圖 + 台灣腔配音
# → 合成 720p 影片 → 自動發布到三平台 → Discord 通知。
# 缺某平台憑證時該平台自動 dry-run，不影響其他平台。
#
# YouTube 憑證集中管理：https://github.com/slashman413/youtube-auth-central
name: Daily Auto Publish

on:
  schedule:
    - cron: '17 1 * * *'      # 每天 01:17 UTC (≈ 09:17 台灣)
  workflow_dispatch:
    inputs:
      topic:
        description: '主題（留空 = 自動從 Google Trends 抓熱門）'
        required: false
        type: string
      minutes:
        description: '影片長度（分鐘）'
        required: false
        type: string
        default: '10'
      geo:
        description: 'Google Trends 地區'
        required: false
        type: string
        default: 'TW'
      publish:
        description: '是否真的發布（false = 全平台 dry-run 測試）'
        required: false
        type: string
        default: 'true'
      en_longform:
        description: '產出英文版長片（預設關閉：歷史數據 15% 留存/約 50 views）'
        required: false
        type: string
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 🎬 Main pipeline
  # ─────────────────────────────────────────────────────────────────────
  auto:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # 🔐 Resolve YouTube credentials from central auth hub — in-job, NOT via
      # job outputs: job outputs are never masked, so the old auth-job pattern
      # printed the client secret + refresh token in cleartext in public logs.
      # Here ::add-mask:: is registered before the values are exported, so all
      # later log lines (including step env dumps) show *** instead.
      # On dry-run (publish=false) nothing is exported → scripts auto-dry-run.
      - uses: actions/checkout@v4
        with:
          repository: slashman413/youtube-auth-central
          token: ${{ secrets.YT_AUTH_TOKEN }}
          path: .central

      - name: Resolve YouTube credentials (masked)
        shell: bash
        run: |
          CONFIG=.central/config.json
          get() { jq -r ".[\"ai-digital-human\"].$1 // \"\"" "$CONFIG"; }
          for key in client_secret refresh_token; do
            val="$(get "$key")"
            if [ -n "$val" ]; then echo "::add-mask::$val"; fi
          done
          if [ "${{ inputs.publish }}" = "false" ]; then
            echo "[dry-run] publish=false — not exporting YouTube credentials"
            exit 0
          fi
          {
            echo "YOUTUBE_CLIENT_ID=$(get client_id)"
            echo "YOUTUBE_CLIENT_SECRET=$(get client_secret)"
            echo "YOUTUBE_REFRESH_TOKEN=$(get refresh_token)"
            echo "YOUTUBE_CHANNEL_ID=$(get channel_id)"
          } >> "$GITHUB_ENV"
          echo "[ok] Resolved client 'ai-digital-human'"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg + CJK fonts + biliup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk fontconfig && sudo fc-cache -f
          curl -sL https://github.com/biliup/biliup-rs/releases/download/v0.2.4/biliupR-v0.2.4-x86_64-linux.tar.xz -o /tmp/biliup.tar.xz
          tar -xf /tmp/biliup.tar.xz -C /tmp
          sudo install -m 755 "$(find /tmp -maxdepth 2 -name biliup -type f | head -n1)" /usr/local/bin/biliup

      - name: Install Python deps
        run: pip install -r requirements.txt google-api-python-client google-auth google-auth-oauthlib

      - name: 1) Pick trending topic
        id: topic
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${{ inputs.topic }}" ]; then
            echo "${{ inputs.topic }}" > topic.txt
          else
            python scripts/trending_topic.py --geo "${{ inputs.geo || 'TW' }}" --source youtube --output topic.txt >/dev/null
          fi
          echo "topic=$(cat topic.txt)" >> "$GITHUB_OUTPUT"
          echo "Topic: $(cat topic.txt)"

      - name: 2) Generate long-form script (+ title/desc/tags)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_longform.py --topic "$(cat topic.txt)" --minutes ${{ inputs.minutes || '10' }} --output scenes.json

      - name: 3) Per-scene TTS + photorealistic backgrounds (1080p)
        run: python scripts/generate_scene_assets.py --scenes scenes.json --voice zh-TW-HsiaoChenNeural --workdir build --width 1920 --height 1080

      - name: 4) Assemble 1080p@30fps (transitions + subs + audio loudnorm + bgm bed)
        run: python scripts/assemble_longform.py --manifest build/manifest.json --output output/final_video.mp4 --fps 30 --transition 0.8 --font "Noto Sans CJK TC" --bgm assets/bgm.mp3 --watermark "Gentle Soul"

      - name: 4b) Generate eye-catching thumbnail (CTR)
        run: python scripts/make_thumbnail.py --image build/img_00.jpg --title "$(cat title.txt)" --output output/thumbnail.jpg --font "Noto Sans CJK TC"

      - name: 4c) Add chapter timestamps to description (retention + SEO)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/make_chapters.py --manifest build/manifest.json --scenes scenes.json --description description.txt --lang zh || true

      - name: 5a) Publish full video to YouTube (public)
        continue-on-error: true
        run: python scripts/upload_youtube.py --video output/final_video.mp4 --title "$(cat title.txt)" --description "$(cat description.txt)" --tags "$(cat tags.txt)" --privacy public --url-out youtube_url.txt --thumbnail output/thumbnail.jpg --playlist PLX0z3_uqHkc2DNvIrjrP-t27brEOhwF1Z --channel-id "$YOUTUBE_CHANNEL_ID" --affiliate "📚 推薦 AI 暢銷書 Co-Intelligence → https://www.amazon.com/dp/059371671X?tag=ytstories0413-20" --kofi https://ko-fi.com/ytstories0413

      - name: 5b) Make + publish 20s YouTube Short (teaser, links to full video)
        continue-on-error: true
        run: |
          python scripts/make_short.py --video output/final_video.mp4 --output output/short.mp4 --duration 20 --font "Noto Sans CJK TC"
          LINK="$(cat youtube_url.txt 2>/dev/null || echo '')"
          DESC="$(printf '完整版看這裡：%s\\n\\n#Shorts %s' "$LINK" "$(cat description.txt 2>/dev/null)")"
          python scripts/upload_youtube.py --video output/short.mp4 --title "$(cat title.txt) #Shorts" --description "$DESC" --tags "$(cat tags.txt),Shorts" --privacy public --url-out youtube_short_url.txt --channel-id "$YOUTUBE_CHANNEL_ID"

      - name: EN-1) Translate scenes + SEO to English (reuse visuals)
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/translate_scenes.py --scenes scenes.json --output scenes_en.json --title-out title_en.txt --desc-out description_en.txt --tags-out tags_en.txt

      - name: EN-2) English voice-over (reuse zh background images)
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        run: python scripts/generate_scene_assets.py --scenes scenes_en.json --voice en-US-AriaNeural --workdir build_en --reuse-images-from build --width 1920 --height 1080

      - name: EN-3) Assemble English video 1080p@30fps (+ bgm bed)
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        run: python scripts/assemble_longform.py --manifest build_en/manifest.json --output output/final_video_en.mp4 --fps 30 --transition 0.8 --font "Noto Sans CJK TC" --bgm assets/bgm.mp3 --watermark "Gentle Soul"

      - name: EN-4) English thumbnail
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        run: python scripts/make_thumbnail.py --image build_en/img_00.jpg --title "$(cat title_en.txt)" --output output/thumbnail_en.jpg --font "Noto Sans CJK TC"

      - name: EN-4b) Add English chapter timestamps
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/make_chapters.py --manifest build_en/manifest.json --scenes scenes_en.json --description description_en.txt --lang en || true

      - name: EN-5) Publish English video to YouTube (public)
        if: ${{ inputs.en_longform == 'true' }}
        continue-on-error: true
        run: python scripts/upload_youtube.py --video output/final_video_en.mp4 --title "$(cat title_en.txt)" --description "$(cat description_en.txt)" --tags "$(cat tags_en.txt)" --privacy public --url-out youtube_en_url.txt --thumbnail output/thumbnail_en.jpg --playlist PLX0z3_uqHkc2DNvIrjrP-t27brEOhwF1Z --channel-id "$YOUTUBE_CHANNEL_ID" --affiliate "📚 Top AI read — Co-Intelligence by Ethan Mollick → https://www.amazon.com/dp/059371671X?tag=ytstories0413-20" --kofi https://ko-fi.com/ytstories0413

      - name: 5c) Publish to Bilibili
        continue-on-error: true
        env:
          BILIBILI_COOKIES_CONTENT: ${{ secrets.BILIBILI_COOKIES }}
          BILIBILI_TID: ${{ vars.BILIBILI_TID }}
        run: |
          if [ "${{ inputs.publish }}" != "false" ] && [ -n "$BILIBILI_COOKIES_CONTENT" ]; then
            printf '%s' "$BILIBILI_COOKIES_CONTENT" > "$RUNNER_TEMP/bili_cookies.json"
            export BILIBILI_COOKIES="$RUNNER_TEMP/bili_cookies.json"
          fi
          python scripts/upload_bilibili.py --video output/final_video.mp4 --title "$(cat title.txt)" --description "$(cat description.txt)" --tags "$(cat tags.txt)"

      - name: 6) Notify Discord (smart — detects actual upload results)
        if: always()
        continue-on-error: true   # a notification failure must never fail the content pipeline (was masking green upload runs as red)
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then exit 0; fi
          python scripts/send_discord_notification.py
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: |
            output/final_video.mp4
            output/thumbnail.jpg
            output/short.mp4
            output/final_video_en.mp4
            output/thumbnail_en.jpg
            scenes.json
            topic.txt
            title.txt
            description.txt
            tags.txt
            title_en.txt
            description_en.txt
            tags_en.txt
          retention-days: 7

  notify-failure:
    needs: [auto]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
