# === Content Pipeline: 全自動 AI 數字人內容生成 ===
# 腳本(LLM) → TTS(edge-tts) → 字幕(Whisper) → 合成(FFmpeg) → 發布(YouTube) → 通知(Discord)
# GPU 口型同步(Wav2Lip) 走 self-hosted runner，預設關閉(見 gpu-processing job)。
# 沒有任何 secret 也能跑完(LLM 用離線範本、TTS/發布自動降級)，方便先驗證流程。
name: AI Digital Human — Content Pipeline

on:
  schedule:
    - cron: '0 8 * * *'        # 每天 08:00 (UTC)
  workflow_dispatch:
    inputs:
      topic:
        description: '影片主題（留空 = LLM 自動產生）'
        required: false
        type: string
      voice:
        description: 'TTS 語音'
        required: false
        type: string
        default: 'zh-CN-XiaoxiaoNeural'
      publish:
        description: '是否上傳 YouTube'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===== Job 1：腳本 + TTS（純 CPU，GitHub Hosted）=====
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate script (+ title/description/tags)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_script.py --topic "${{ inputs.topic }}" --output script.txt

      - name: Generate TTS (edge-tts)
        run: |
          python scripts/generate_tts.py \
            --input script.txt \
            --voice "${{ inputs.voice || 'zh-CN-XiaoxiaoNeural' }}" \
            --output audio/voice.mp3

      - name: Upload content artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: |
            script.txt
            title.txt
            description.txt
            tags.txt
            audio/voice.mp3
          if-no-files-found: warn

  # ===== Job 2：字幕 + 影片合成（純 CPU，FFmpeg）=====
  compose-video:
    needs: generate-content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ffmpeg + CJK fonts
        # fonts-noto-cjk is required or Chinese subtitles render as tofu boxes.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk fontconfig && sudo fc-cache -f

      - name: Download content artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-content

      - name: Generate subtitles (Whisper CPU)
        run: |
          pip install openai-whisper
          python scripts/generate_subtitles.py --audio audio/voice.mp3 --model tiny --output subtitles.srt

      - name: Ensure background asset (placeholder if none committed)
        run: |
          mkdir -p assets output
          if [ ! -f assets/background.png ]; then
            ffmpeg -y -f lavfi -i color=c=0x1f2937:s=1280x720 -frames:v 1 assets/background.png
          fi

      - name: Compose final video (FFmpeg)
        run: |
          mkdir -p output
          if [ ! -s audio/voice.mp3 ]; then
            echo "[warn] no audio — generating 5s silent track so compose still runs"
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo -t 5 audio/voice.mp3
          fi
          ffmpeg -y \
            -loop 1 -i assets/background.png \
            -i audio/voice.mp3 \
            -vf "subtitles=subtitles.srt:charenc=UTF-8:force_style='FontName=Noto Sans CJK TC,FontSize=24,PrimaryColour=&H00FFFFFF,Outline=2,Shadow=1'" \
            -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -shortest \
            output/final_video.mp4

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: |
            output/final_video.mp4
            title.txt
            description.txt
            tags.txt

  # ===== Job 3：多平台發布（YouTube + Bilibili 平行）=====
  # 數字人採「圖文影片」(背景+字幕+語音)，不需 GPU 口型同步。
  # 每個平台缺憑證時自動 dry-run，不會讓流程失敗。
  publish:
    needs: compose-video
    runs-on: ubuntu-latest
    if: ${{ inputs.publish == true || github.event_name == 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [youtube, bilibili]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download final video
        uses: actions/download-artifact@v4
        with:
          name: final-video
      - name: Install publisher deps
        run: |
          pip install requests
          if [ "${{ matrix.platform }}" = "youtube" ]; then
            pip install google-api-python-client google-auth google-auth-oauthlib
          fi
          if [ "${{ matrix.platform }}" = "bilibili" ]; then
            curl -sL https://github.com/biliup/biliup-rs/releases/download/v0.2.4/biliupR-v0.2.4-x86_64-linux.tar.xz -o /tmp/biliup.tar.xz
            tar -xf /tmp/biliup.tar.xz -C /tmp
            BIN=$(find /tmp -maxdepth 2 -name biliup -type f | head -n1)
            sudo install -m 755 "$BIN" /usr/local/bin/biliup
            biliup --version || true
          fi
      - name: Publish to ${{ matrix.platform }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # Bilibili cookie JSON is stored as a secret; we materialize it to a file.
          BILIBILI_COOKIES_CONTENT: ${{ secrets.BILIBILI_COOKIES }}
          BILIBILI_TID: ${{ vars.BILIBILI_TID }}
        run: |
          if [ "${{ matrix.platform }}" = "bilibili" ] && [ -n "$BILIBILI_COOKIES_CONTENT" ]; then
            printf '%s' "$BILIBILI_COOKIES_CONTENT" > "$RUNNER_TEMP/bili_cookies.json"
            export BILIBILI_COOKIES="$RUNNER_TEMP/bili_cookies.json"
          fi
          python scripts/upload_${{ matrix.platform }}.py \
            --video output/final_video.mp4 \
            --title "$(cat title.txt 2>/dev/null || echo 'AI 數字人影片')" \
            --description "$(cat description.txt 2>/dev/null || echo '由 GitHub Actions 自動產生')" \
            --tags "$(cat tags.txt 2>/dev/null || echo 'AI,數字人')"

  # ===== Job 4：通知 =====
  notify:
    needs: [compose-video, publish]
    runs-on: ubuntu-latest
    if: always()
    env:
      WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}   # secrets aren't allowed in `if`; surface via env
    steps:
      - name: Discord notification
        if: ${{ env.WEBHOOK != '' }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"🤖 AI 數字人影片流程完成 — compose: ${{ needs.compose-video.result }}, publish: ${{ needs.publish.result }}\"}" \
            "$WEBHOOK"
