# === Long-form video: ~10 min, 480p@30fps, auto-generated switching backgrounds ===
# DeepSeek 寫多分鏡腳本 → 每段 TTS(台灣腔) + 自動生成對應背景圖(Pollinations) →
# 合成 480p@30fps，背景隨腳本切換、燒上繁體字幕。產出為 artifact 下載。
name: Long-form Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: '主題（留空 = LLM 自動產生）'
        required: false
        type: string
      minutes:
        description: '影片長度（分鐘）'
        required: false
        type: string
        default: '10'
      voice:
        description: 'TTS 語音'
        required: false
        type: string
        default: 'zh-TW-HsiaoChenNeural'

jobs:
  longform:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ffmpeg + CJK fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk fontconfig && sudo fc-cache -f
      - name: Install deps
        run: pip install -r requirements.txt

      - name: 1) Generate long-form script (DeepSeek)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_longform.py --topic "${{ inputs.topic }}" --minutes ${{ inputs.minutes || '10' }} --output scenes.json

      - name: 2) Per-scene TTS + background images
        run: python scripts/generate_scene_assets.py --scenes scenes.json --voice "${{ inputs.voice || 'zh-TW-HsiaoChenNeural' }}" --workdir build --width 854 --height 480

      - name: 3) Assemble 480p@30fps with switching backgrounds + subtitles
        run: python scripts/assemble_longform.py --manifest build/manifest.json --output output/final_video.mp4 --fps 30 --font "Noto Sans CJK TC"

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: longform-video
          path: |
            output/final_video.mp4
            scenes.json
          retention-days: 7
